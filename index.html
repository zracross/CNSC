<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class IX Students' Council</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <h1>Class IX Students' Council</h1>
    <p>Official Student Information Portal</p>
</header>

<nav>
    <button onclick="showSection('syllabus')">Syllabus</button>
    <button onclick="showSection('project')">Project</button>
    <button onclick="location.href='admin.html'">Official Login</button>
</nav>

<main>

    <!-- SYLLABUS SECTION -->
    <section id="syllabus" class="section">

        <h2>📚 Syllabus (2nd Summative Only)</h2>

        <div class="subject-grid">

            <div class="card" onclick="openSubject('Bengali')">
                Bengali
            </div>

            <div class="card" onclick="openSubject('English')">
                English
            </div>

            <div class="card" onclick="openSubject('Mathematics')">
                Mathematics
            </div>

            <div class="card" onclick="openSubject('Physical Science')">
                Physical Science
            </div>

            <div class="card" onclick="openSubject('Life Science')">
                Life Science
            </div>

            <div class="card" onclick="openSubject('History')">
                History
            </div>

            <div class="card" onclick="openSubject('Geography')">
                Geography
            </div>

        </div>

    </section>

    <!-- PROJECT SECTION -->
    <section id="project" class="section" style="display:none;">

        <h2>📝 Projects</h2>

        <div class="subject-grid">

            <div class="card" onclick="openProject('Bengali')">
                Bengali
            </div>

            <div class="card" onclick="openProject('English')">
                English
            </div>

            <div class="card" onclick="openProject('Mathematics')">
                Mathematics
            </div>

            <div class="card" onclick="openProject('Physical Science')">
                Physical Science
            </div>

            <div class="card" onclick="openProject('Life Science')">
                Life Science
            </div>

            <div class="card" onclick="openProject('History')">
                History
            </div>

            <div class="card" onclick="openProject('Geography')">
                Geography
            </div>

        </div>

    </section>

</main>

<footer>
    <p>© 2026 Class IX Students' Council</p>
</footer>

<script src="app.js"></script>

</body>
</html>
