<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class IX Students' Council</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Class IX Students' Council</h1>
    <p>Official Student Information Portal</p>
</header>

<nav>
    <button onclick="showSection('syllabus')">
        Syllabus

<button onclick="showSection('project')">

</button>

<button onclick="location.href='admin.html'">

</button>

</nav>

<main>

onclick="openSubject('BENGALI')">

</div>

<div class="card"
onclick="openSubject('ENGLISH')">

</div>

<div class="card"
onclick="openSubject('MATH')">

</div>

<div class="card"
onclick="openSubject('PHYSICAL SCIENCE')">

</div>

<div class="card"
onclick="openSubject('LIFE SCIENCE')">

</div>

<div class="card"
onclick="openSubject('HISTORY')">
History
</div>

<div class="card"
onclick="openSubject('GEOGRAPHY')">

</div>

</div>

</section>

<section
id="project"
class="section"

<div class="subject-grid">

onclick="openProject('BENGALI')">

</div>

onclick="openProject('PHYSICAL SCIENCE')">

</div>

onclick="openProject('LIFE SCIENCE')">
Life Science
</div>

<div class="card"
onclick="openProject('HISTORY')">
History
</div>

<div class="card"
onclick="openProject('GEOGRAPHY')">
Geography
</div>

</div>

</section>

</main>

<footer>
<p>
© 2026 Class IX Students' Council
</p>
</footer>

<script src="app.js"></script>

</body>
</html>
